<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ココフォリアログ編集ツール</title>
  <link rel="stylesheet" href="ccfolia-log-editor.css">
</head>
<body>
  <main class="tool">
    <h1>ココフォリアログ編集ツール</h1>

<section class="top-dashboard">

  <section class="dash-card dash-file">
    <h2>ファイル</h2>
    <div class="dash-row">
      <input type="file" id="fileInput" accept=".html,text/html">
    </div>
    <div class="dash-row file-actions">
      <button id="downloadBtn" disabled>編集済みHTMLを保存</button>
    </div>
  </section>

  <section id="summary" class="dash-card dash-summary">
    投稿 0 件 / 名前 0 種 / タブ 0 種
  </section>

  <section class="dash-card dash-search">
    <h2>検索・絞り込み</h2>
    <input id="searchInput" type="search" placeholder="名前・本文・タブを検索">

    <div class="dash-grid-2">
      <select id="tabFilter">
        <option value="">すべてのタブ</option>
      </select>

      <select id="statusFilter">
        <option value="">すべての状態</option>
        <option value="edited">編集済のみ</option>
        <option value="added">追加のみ</option>
        <option value="deleted">削除予定のみ</option>
      </select>
    </div>
  </section>

  <section class="dash-card dash-page">
    <h2>表示・ページ</h2>

    <select id="pageSizeSelect">
      <option value="50">50件ずつ</option>
      <option value="100" selected>100件ずつ</option>
      <option value="200">200件ずつ</option>
      <option value="999999">全件表示</option>
    </select>

    <div class="pager-row">
      <button id="prevPageBtn">前へ</button>
      <span id="pageInfo">- / -</span>
      <button id="nextPageBtn">次へ</button>
    </div>
  </section>

  <section class="dash-card dash-action">
    <h2>操作</h2>

    <button id="bulkDeleteVisibleBtn" disabled>表示中を一括削除</button>
    <button id="bulkRestoreVisibleBtn" disabled>表示中の削除解除</button>

    <div class="work-save-row">
      <button id="saveWorkBtn" disabled>途中保存JSON</button>
      <input type="file" id="workFileInput" accept=".json,application/json">
    </div>
  </section>

</section>

    
    <section class="panel add-panel">
      <h2>投稿を追加</h2>
      <select id="insertPosition">
        <option value="top">先頭に追加</option>
        <option value="bottom">末尾に追加</option>
      </select>
      <select id="newTab"></select>
      <select id="newName"></select>
      <input id="newColor" type="text" placeholder="#888888">
      <textarea id="newText" rows="4" placeholder="本文"></textarea>
      <button id="addPostBtn" disabled>投稿を追加</button>
    </section>

    <section id="posts" class="posts"></section>
  </main>

  <script src="ccfolia-log-editor.js"></script>
</body>
</html>
